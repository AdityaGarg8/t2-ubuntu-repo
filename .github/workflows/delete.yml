---
name: Remove all releases

on:
  workflow_dispatch:

jobs:
  Cleanup:
      matrix:
        target:
          - info: "Ubuntu 22.04 Jammy Jellyfish"
            name: jammy
          - info: "Ubuntu 24.04 Noble Numbat"
            name: noble
          - info: "Ubuntu 25.10 Questing Quokka"
            name: questing
          - info: "Ubuntu 26.04 Resolute Raccoon"
            name: resolute
          - info: "Debian 12 Bookworm"
            name: bookworm
          - info: "Debian 13 Trixie"
            name: trixie
          - info: "Debian Testing"
            name: testing
    runs-on: ubuntu-latest
    steps:

      - name: 'Checkout Repo'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: larryjoelane/delete-release-action@v1.0.24
        with:
          release-name: '${{ matrix.target.name }}'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/KEY.gpg
          tag_name: jammy
          body: Apt repo for ${{ matrix.target.info }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
